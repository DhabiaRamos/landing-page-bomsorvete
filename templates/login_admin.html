<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='output.css') }}">
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">

        <!-- LOGO -->

        <div class="text-center flex flex-col items-center mb-8">
            
            <img src="/static/img/logo.png" alt="" class="w-12 md:w-24">
            <h1 class="text-5xl font-bold text-[#F75281]">
                BomSorvete
            </h1>
            <p class="text-slate-500 mt-2">
                Painel Administrativo
            </p>

        </div>

        <!-- CARD LOGIN -->

        <div class="bg-white rounded-3xl shadow-2xl p-8">

            <div class="text-center mb-8">

                <h2 class="text-3xl font-bold text-gray-800">
                    Acesso Restrito
                </h2>

                <p class="text-gray-500 mt-2">
                    Digite a senha para acessar o painel
                </p>

            </div>

            <form method="POST" class="space-y-5">

                <div class="rounded-lg p-6">

                    <input
                        type="password"
                        name="senha"
                        placeholder="Digite sua senha"
                        required

                        class="
                        w-full
                        border-2
                        rounded-2xl
                        p-4
                        focus:outline-none
                        focus:border-pink-500
                        transition
                        ">

                </div>

                <button
                    type="submit"

                    class="
                    w-full
                    bg-[#F75281]
                    p-2
                    hover:bg-pink-600
                    text-slate-100
                    font-bold
                    cursor-pointer
                    rounded-2xl
                    transition
                    shadow-lg
                    hover:shadow-xl
                    ">

                    Entrar no Painel

                </button>

            </form>

            <div class="mt-6 text-center">

                <a href="/"
                   class="text-[#F75281] hover:text-pink-700 font-medium">

                    Voltar ao site

                </a>

            </div>

        </div>

    </div>

</body>

</html>
