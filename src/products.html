<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <link rel="shortcut icon" href="/assets/imgs/logo.png" type="image/x-icon">
    <title>Produtos</title>
</head>
<body class="bg-[#F75281] min-h-screen scroll-smooth">
    <header class="h-24 bg-sky-50 flex justify-between items-center p-8 shadow-lg">
        
        <div class="flex items-center">
            <img src="/assets/imgs/logo.png" alt="" class="w-12 md:w-24">
            <p class="text-[#F75281] text-2xl font-bold">BomSorvete</p>
        </div>

        <nav class="hidden gap-2 md:flex lg:gap-10">
            <a href="./index.html" class="text-[20px] text-slate-500 font-bold hover:text-slate-900 lg:text-2xl">Inicio</a>
            <a href="/src/index.html#produtos" class="text-[20px] text-slate-500 font-bold hover:text-slate-900 lg:text-2xl">Produtos</a>
        </nav>

        <a href="/src/index.html" class="bg-[#ff779d] text-2xl text-sky-50 text-center p-4 rounded-4xl w-64 cursor-pointer hover:bg-[#F75281] lg:text-2xl lg:w-60 md:w-52 md:text-[15px]">Voltar</a>
    </header>

    <main>
        <!-- Parte de fazer o pedido  -->
        <section id="pedidoSection" class="bg-slate-100 flex flex-col justify-center items-center p-20">
            <h1 class="text-[#790010] text-5xl font-bold text-center mb-4">Fazer pedido</h1>

            <form action="" id="formularioPedido" class="flex flex-col gap-4 bg-[#ff779d] rounded-2xl p-8 w-10/12
                lg:w-1/2">
                <label for="nome" class="text-slate-100 text-2xl font-bold">Nome</label>
                <input type="text" name="nome" id="nome" class="border-b-2 border-slate-200 focus:outline focus:outline-slate-200 text-slate-100 rounded-lg p-2">

                <label for="tel" class="text-slate-100 text-2xl font-bold">Telefone</label>
                <input type="tel" name="tel" id="tel" class="border-b-2 border-slate-200 focus:outline focus:outline-slate-200 text-slate-100 rounded-lg p-2">

                <label for="pedido" class="text-slate-100 text-2xl font-bold">Pedido</label>
                <input type="text" name="pedido" id="pedido" class="border-b-2 border-slate-200 focus:outline focus:outline-slate-200 text-slate-100 rounded-lg p-2">

                <input type="submit" value="Enviar" class="border-2 border-slate-200 rounded-2xl text-slate-100 text-2xl p-2 cursor-pointer hover:bg-[#F75281]">
            </form>
        </section>

    </main>

    <footer class="flex justify-around items-center p-6 gap-20">
        <div class="flex flex-col items-center md:flex-row">
            <img src="/assets/imgs/logo.png" alt="" class="w-24">
            <p class="text-slate-100 text-2xl font-bold">BomSorvete</p>
        </div>

        <p class="text-[#ff83a6]">©2026 por BomSorvete Ltda.</p>

        <div class="flex flex-col justify-center items-center gap-2">
            <div class="flex justify-center items-center gap-2">
                <img src="/assets/imgs/icon-zap.png" alt="" class="w-6">
                <p class="text-slate-100">(99) 99999-9999</p>
            </div>

            <div class="flex justify-center items-center gap-2">
                <img src="/assets/imgs/icon-insta.png" alt="" class="w-6">
                <p class="text-slate-100">@BomSorvete</p>
            </div>
                
        </div>
    </footer>

    <script src="/src/scritpProducts.js"></script>
</body>
</html>
